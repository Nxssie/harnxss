<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<title>Glyphs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ps-bg-card);font-family:var(--ps-font-body);color:var(--ps-fg-1);}
  .wrap{padding:18px 22px;display:grid;grid-template-columns:repeat(8,1fr);gap:14px;height:150px;box-sizing:border-box;align-items:start;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .icon{height:38px;display:flex;align-items:center;justify-content:center;color:var(--ps-fg-1);}
  .icon img{height:100%;width:auto;max-width:64px;}
  .lbl{font-family:var(--ps-font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ps-fg-4);}
</style></head>
<body>
<div class="wrap">
  <div class="cell"><div class="icon"><img src="../assets/glyphs/xxxy.svg"></div><div class="lbl">xxxy</div></div>
  <div class="cell"><div class="icon"><img src="../assets/glyphs/heart-pixel.svg"></div><div class="lbl">heart_px</div></div>
  <div class="cell"><div class="icon"><img src="../assets/glyphs/diamond.svg"></div><div class="lbl">diamond</div></div>
  <div class="cell"><div class="icon"><img src="../assets/glyphs/target-x.svg"></div><div class="lbl">target_x</div></div>
  <div class="cell"><div class="icon"><img src="../assets/glyphs/reticle.svg"></div><div class="lbl">reticle</div></div>
  <div class="cell"><div class="icon"><img src="../assets/glyphs/register-cross.svg"></div><div class="lbl">register</div></div>
  <div class="cell"><div class="icon"><img src="../assets/glyphs/no-symbol.svg"></div><div class="lbl">no_sym</div></div>
  <div class="cell"><div class="icon"><img src="../assets/glyphs/glitch-block.svg"></div><div class="lbl">glitch</div></div>
</div>
</body></html>
