<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<title>Logomark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; font-family: var(--ps-font-body); background: var(--ps-bg-card); color: var(--ps-fg-1); }
  .wrap { padding: 24px 28px; display:flex; align-items:center; gap:36px; height: 150px; box-sizing:border-box; }
  .mark { width: 72px; height:72px; color: var(--ps-fg-1); }
  .type { display:flex; flex-direction:column; gap: 6px; }
  .name { font-family: var(--ps-font-display); font-weight:700; font-size: 40px; letter-spacing:-.02em; line-height:1; }
  .name em { font-style:normal; opacity:.5; }
  .code { font-family: var(--ps-font-mono); font-size: 11px; letter-spacing:.14em; text-transform:uppercase; color: var(--ps-fg-4); }
  .right { margin-left:auto; display:flex; align-items:flex-end; gap: 24px; }
  .dark { background: var(--ps-ink-900); padding: 12px 16px; display:flex; align-items:center; gap:10px; color: var(--ps-white); }
  .dark svg { color: var(--ps-white); }
  .dark span { font-family: var(--ps-font-display); font-weight:700; font-size: 20px; letter-spacing:-.02em; }
  .dark span em { font-style:normal; opacity:.5; }
</style></head>
<body>
<div class="wrap">
  <img src="../assets/logomark.svg" class="mark" alt="">
  <div class="type">
    <div class="name">PRINT<em>STREAM</em></div>
    <div class="code">///rev.B ; _handle_with_care;</div>
  </div>
  <div class="right">
    <div class="dark">
      <img src="../assets/logomark.svg" style="width:32px;height:32px;filter:invert(1)">
      <span>PRINT<em>STREAM</em></span>
    </div>
  </div>
</div>
</body></html>
