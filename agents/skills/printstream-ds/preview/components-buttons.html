<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ps-bg-card);font-family:var(--ps-font-body);}
  .wrap{padding:22px;height:150px;box-sizing:border-box;display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  button{font-family:var(--ps-font-mono);font-weight:500;font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:10px 18px;border:1px solid #000;background:#fff;color:#000;cursor:pointer;position:relative;}
  button:hover{background:var(--ps-pearl-100);}
  button.primary{background:var(--ps-ink-900);color:#fff;border-color:#000;}
  button.primary:hover{background:var(--ps-graphite-700);}
  button.ghost{border-color:rgba(0,0,0,.2);background:transparent;}
  button.icon{padding:8px 10px;display:inline-flex;align-items:center;gap:8px;}
  button.icon svg{width:12px;height:12px;}
  .disabled{opacity:.35;pointer-events:none;}
  .shim{position:relative;overflow:hidden;}
  .shim::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--ps-pearl-gradient);opacity:0;transition:opacity .22s;}
  .shim:hover::after{opacity:1;}
</style></head>
<body>
<div class="wrap">
  <button class="primary shim">DEPLOY;</button>
  <button class="shim">CALIBRATE;</button>
  <button class="ghost">CANCEL;</button>
  <button class="primary icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l5 5L20 7"/></svg>CONFIRM;</button>
  <button class="disabled">LOCKED;</button>
</div>
</body></html>
