<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ps-bg-card);color:var(--ps-fg-1);}
  .wrap{padding:20px 24px;height:150px;box-sizing:border-box;display:flex;gap:18px;align-items:center;}
  .box{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .chip{width:64px;height:64px;background:var(--ps-ink-900);}
  .lbl{font-family:var(--ps-font-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ps-fg-4);}
  .hex{font-family:var(--ps-font-mono);font-size:9px;opacity:.5;}
  .pill{width:104px;height:28px;background:var(--ps-ink-900);border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--ps-font-mono);font-size:10px;letter-spacing:.14em;}
</style></head>
<body>
<div class="wrap">
  <div class="box"><div class="chip" style="border-radius:0"></div><div class="lbl">radius-0</div><div class="hex">0px · default</div></div>
  <div class="box"><div class="chip" style="border-radius:2px"></div><div class="lbl">radius-1</div><div class="hex">2px</div></div>
  <div class="box"><div class="chip" style="border-radius:4px"></div><div class="lbl">radius-2</div><div class="hex">4px · chip</div></div>
  <div class="box"><div class="chip" style="border-radius:8px"></div><div class="lbl">radius-3</div><div class="hex">8px · card</div></div>
  <div class="box"><div class="pill">B11;</div><div class="lbl">pill</div><div class="hex">999px</div></div>
</div>
</body></html>
