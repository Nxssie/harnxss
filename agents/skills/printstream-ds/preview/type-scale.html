<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ps-bg-card);color:var(--ps-fg-1);}
  .wrap{padding:14px 22px;height:150px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:space-between;}
  .row{display:flex;align-items:baseline;gap:16px;}
  .tag{font-family:var(--ps-font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ps-fg-4);width:70px;flex:none;}
  .spec{font-family:var(--ps-font-mono);font-size:9px;color:var(--ps-fg-4);margin-left:auto;}
</style></head>
<body>
<div class="wrap">
  <div class="row"><div class="tag">h1 / display</div><div style="font-family:var(--ps-font-display);font-weight:700;font-size:40px;letter-spacing:-.02em;line-height:1;">Handle with care.</div><div class="spec">SpaceGrotesk 700 · 64</div></div>
  <div class="row"><div class="tag">h2</div><div style="font-family:var(--ps-font-display);font-weight:600;font-size:28px;letter-spacing:-.01em;line-height:1.1;">Print. Stream. Calibrate.</div><div class="spec">SpaceGrotesk 600 · 44</div></div>
  <div class="row"><div class="tag">h4</div><div style="font-family:var(--ps-font-body);font-weight:600;font-size:17px;">Module B11 — rev.B</div><div class="spec">InterTight 600 · 24</div></div>
  <div class="row"><div class="tag">body</div><div style="font-family:var(--ps-font-body);font-size:14px;color:var(--ps-fg-2);">Dense by default. White space is earned by removing ornament.</div><div class="spec">InterTight 400 · 15</div></div>
</div>
</body></html>
